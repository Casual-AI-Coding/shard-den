[package]
name = "shard-den-uml-styler-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "UML Styler CLI for ShardDen"

[[bin]]
name = "shard-den-uml-styler"
path = "main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
shard-den-uml-styler = { path = ".." }
shard-den-core = { version = "0.3.0", path = "../../../core" }
