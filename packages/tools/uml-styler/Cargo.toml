[package]
name = "shard-den-uml-styler"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "UML Styler tool for ShardDen"

[features]
default = []
wasm = ["wasm-bindgen", "serde-wasm-bindgen", "console_error_panic_hook"]

[dependencies]
serde.workspace = true
shard-den-core = { version = "0.3.1", path = "../../core" }
thiserror.workspace = true
tracing.workspace = true

wasm-bindgen = { workspace = true, optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
console_error_panic_hook = { workspace = true, optional = true }

[dev-dependencies]
wasm-bindgen-test.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
name = "shard_den_uml_styler"
[[test]]
name = "engine_interface_test"
path = "tests/engine_interface_test.rs"

[[test]]
name = "theme_templates_test"
path = "tests/theme_templates_test.rs"
