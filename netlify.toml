[build]
  publish = "packages/web/out"
  directory = "."
  command = "npm install -g wasm-pack && cargo build --release -p shard-den-wasm --target wasm32-unknown-unknown && wasm-pack build packages/wasm --target web --out-dir pkg && cd packages/web && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  RUST_TOOLCHAIN = "stable"

[[redirects]]
  from = "/wasm/*"
  to = "/wasm/:splat"
  status = 200

[context.production.environment]
  NEXT_TELEMETRY_DISABLED = "1"
